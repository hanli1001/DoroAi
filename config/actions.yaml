# 动作优先级：数字越大优先级越高
# 闲置动作（优先级1）
idle:
  - id: idle_default
    name: 默认闲置
    path: "resources/images/logo.png"
    duration: 3000
    weight: 3

# 漫游动作（优先级2）
roam:
  - id: roam_walk
    name: 漫游走路
    path: "resources/images/roam.gif"
    duration: -1
    trigger: ["roam_walk"]

# 橘子视线动作（优先级4）
look:
  - id: look_left
    name: 左看橘子
    path: "resources/images/logo.png"
    duration: 200
    trigger: ["look_left"]
  - id: look_right
    name: 右看橘子
    path: "resources/images/logo.png"
    duration: 200
    trigger: ["look_right"]
  - id: look_up
    name: 上看橘子
    path: "resources/images/logo.png"
    duration: 200
    trigger: ["look_up"]
  - id: look_down
    name: 下看橘子
    path: "resources/images/logo.png"
    duration: 200
    trigger: ["look_down"]

# 交互动作（优先级5）
interact:
  - id: click_tsundere
    name: 点击傲娇
    path: "resources/images/logo.png"
    duration: 2000
    trigger: ["left_click"]
  - id: hover_clingy
    name: 悬停贴贴
    path: "resources/images/logo.png"
    duration: 2500
    trigger: ["mouse_hover"]

# 拖拽动作（优先级8）
drag:
  - id: lifted_up
    name: 被提起
    path: "resources/images/logo.png"
    duration: -1
    trigger: ["lifted_up"]
  - id: put_down
    name: 被放下
    path: "resources/images/logo.png"
    duration: 500
    trigger: ["put_down"]

# 情绪动作（优先级7）
emotion:
  - id: happy_feed
    name: 投喂开心
    path: "resources/images/logo.png"
    duration: 4000
    trigger: ["feed"]
  - id: sad_ignore
    name: 被冷落委屈
    path: "resources/images/logo.png"
    duration: 3500
    trigger: ["ignore"]

# 抢夺动作（优先级10）
grab:
  - id: grab_orange
    name: 抢夺橘子
    path: "resources/images/logo.png"
    duration: 300
    trigger: ["grab_orange"]

# 命令动作（优先级9）
command:
  - id: dance
    name: 跳舞
    path: "resources/images/logo.png"
    duration: 5000
    command: ["dance", "跳舞", "跳个舞"]
  - id: sleep
    name: 睡觉
    path: "resources/images/logo.png"
    duration: -1
    command: ["sleep", "睡觉", "晚安"]
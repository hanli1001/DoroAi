# 窗口配置
window:
  width: 400
  height: 300
  always_on_top: true
  frameless: true

# 宠物图片配置
pet:
  image_path: "resources/images/logo.png"
  image_width: 180
  image_height: 200

# 豆包API配置
ai:
  api_url: "https://ark.cn-beijing.volces.com/api/v3/chat/completions"
  api_key: "90d84c3f-e6c0-411c-a046-fc9db871fd3e"
  model: "doubao-seed-2-0-pro-260215"
  max_tokens: 2048
  temperature: 0.75
  timeout_connect: 8
  timeout_read: 40

# 定时器配置
timer:
  idle_line_interval: 15000  # 闲置台词触发间隔（毫秒）
  ignore_check_interval: 45000  # 冷落检测间隔（毫秒）
  line_display_duration: 4000  # 台词显示时长（毫秒）

# 气泡配置
bubble:
  min_width: 100
  max_width: 280
  min_height: 45
  bg_color: [255, 182, 193, 160]
  border_color: [255, 255, 255, 180]

# 记忆配置
memory:
  memory_file: "user_memory.json"